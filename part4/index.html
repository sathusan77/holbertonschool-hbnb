<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB — Available Places</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <a href="index.html" class="logo-text">HBnB</a>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html" class="login-button" id="login-link">Login</a>
    </nav>
</header>
<div class="hero">
    <div class="hero-content">
        <h1>Find your perfect <span>escape</span></h1>
        <p>Discover unique places to stay around the world</p>
    </div>
</div>
<main>
    <div class="filter-section">
        <label for="price-filter">Max price per night</label>
        <select id="price-filter">
            <option value="all">All prices</option>
            <option value="10">Up to 10€</option>
            <option value="50">Up to 50€</option>
            <option value="100">Up to 100€</option>
        </select>
    </div>
    <section class="places" id="places-list"></section>
</main>
<footer>
    <p>All rights reserved &copy; HBnB 2025</p>
</footer>
<script src="scripts.js"></script>
</body>
</html>
