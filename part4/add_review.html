<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB — Add Review</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <a href="index.html" class="logo-text">HBnB</a>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html" class="login-button" id="login-link">Login</a>
    </nav>
</header>
<main>
    <div class="form-container">
        <h1>Write a Review</h1>
        <form id="review-form" class="add-review">
            <div>
                <label for="rating">Rating (1–5)</label>
                <input type="number" id="rating" name="rating" min="1" max="5" placeholder="4" required>
            </div>
            <div>
                <label for="comment">Your experience</label>
                <textarea id="comment" name="comment" rows="5" placeholder="Tell us about your stay..." required></textarea>
            </div>
            <button type="submit">Submit Review</button>
            <p id="review-error"></p>
        </form>
    </div>
</main>
<footer>
    <p>All rights reserved &copy; HBnB 2025</p>
</footer>
<script src="scripts.js"></script>
</body>
</html>
